
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K</title>
<link rel="icon" type="image/png" href="Kfi.jpg">

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Libre Baskerville', serif;
background:#EFE6D8;
color:#6A5847;
display:flex;
flex-direction:column;
align-items:center;
padding:80px 20px;
}

/* IMAGE CIRCLE */
.image-container{
width:350px;
height:350px;
border-radius:50%;
overflow:hidden;
box-shadow:0 15px 30px rgba(0,0,0,0.08);
margin-bottom:60px;
}

.image-container img{
max-width:100%;
height:auto;
object-fit:cover;
}

/* CARD */
.card{
background:white;
max-width:600px;
padding:60px;
box-shadow:0 15px 30px rgba(0,0,0,0.06);
line-height:1.9;
text-align:center;
}

h1{
font-size:70px;
font-weight:300;
letter-spacing:8px;
margin-bottom:30px;
}

.divider{
width:50px;
height:1px;
background:#CBBBA7;
margin:30px auto;
}

.footer{
margin-top:60px;
letter-spacing:3px;
font-size:14px;
}

/* LINK STYLE */
.link-box{
display:inline-block;
margin-top:30px;
padding:10px 25px;
border-radius:25px;
background:#EFE6D8;
color:#6A5847;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
transition:0.3s;
}

.link-box:hover{
background:#CBBBA7;
}
@media (max-width: 768px){

h1{
    font-size:40px;
    letter-spacing:4px;
}

.subtitle{
    font-size:16px;
}

.letter{
    padding:30px;
    font-size:16px;
}

.section{
    padding:60px 20px;
}

/* Split screen fix */
.container{
    flex-direction:column;
    height:auto;
}

.left{
    height:300px;
}

.right{
    padding:40px 25px;
}

.image-container{
    width:220px;
    height:220px;
}

.card{
    padding:35px;
}

footer{
    position:static;
    margin-top:40px;
}
}
</style>
</head>

<body>

<div class="image-container">
    <img src="cookies.jpg">
</div>

<div class="card">
    <h1>K</h1>

    <div class="divider"></div>

    keeper of sweetness.  
    keeper of comfort.  
    keeper of the little things that matter most.  

    <br><br>

    like cookies in a tin,  
    you hold memories carefully.  

    warm. familiar. safe.  

    <br><br>

    you are not loud.  
    you are lasting.

    <br><br>

    Y

    <br><br>

    <a href="special_js4u.html">Special Just For You</a>


</div>

<div class="footer">
mtk series • chapter iii
</div>

</body>

</html>
